<!DOCTYPE html>
<html>

<head>
    <title>Iloilo Route Checker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">

    <style>
        body {
            background: #d6ecff;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-header bg-primary text-white text-center">
                <h3>Iloilo Travel Route</h3>
            </div>

            <div class="card-body text-center">

                <select id="route" class="form-select mb-3">
                    <option value="Iloilo City - Bingawan">Iloilo City - Bingawan</option>
                    <option value="Iloilo City - Calinog">Iloilo City - Calinog</option>
                    <option value="Iloilo City - Lambunao">Iloilo City - Lambunao</option>
                    <option value="Iloilo City - Janiuay">Iloilo City - Janiuay</option>
                    <option value="Iloilo City - Cabatuan">Iloilo City - Cabatuan</option>
                </select>

                <button onclick="saveRoute()" class="btn btn-success me-2">Save Route</button>
                <button onclick="displayRoutes()" class="btn btn-warning">Show Routes</button>

            </div>

        </div>

        <div class="row mt-4" id="output"></div>

    </div>

    <script>
        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }

        // Save route
        function saveRoute() {
            let route = document.getElementById("route").value;
            let routes = JSON.parse(localStorage.getItem("iloiloRoutes")) || [];
            routes.push(route);
            localStorage.setItem("iloiloRoutes", JSON.stringify(routes));
            alert("Route Saved!");
        }

        // Display saved routes
        function displayRoutes() {
            let routes = JSON.parse(localStorage.getItem("iloiloRoutes")) || [];
            let output = document.getElementById("output");
            output.innerHTML = "";

            routes.forEach(function (route) {
                output.innerHTML += `
                <div class="col-md-4 mb-3">
                    <div class="card text-bg-primary">
                        <div class="card-body">
                            <h5>Saved Route</h5>
                            <p>${route}</p>
                        </div>
                    </div>
                </div>
                `;
            });
        }
    </script>

</body>

</html>
